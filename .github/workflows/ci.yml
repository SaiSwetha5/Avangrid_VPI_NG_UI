name: CI (Angular)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [ '20', '22' ]   # Use ['20'] if you only want Node 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Print versions
        run: |
          node -v
          npm -v
          npx ng version || true

      - name: Install dependencies
        run: npm ci

      - name: Lint (optional)
        if: hashFiles('eslint.config.*', '.eslintrc*') != ''
        run: npm run lint --if-present

      - name: Build (production)
        run: npx ng build --configuration production --verbose

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-node-${{ matrix.node }}
          path: dist/
          if-no-files-found: warn
          retention-days: 7

  sonar:
    name: SonarCloud Analysis (non-blocking)
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true   # <-- prevents Sonar from failing the workflow
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20 for scan
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies (no build)
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=avangrid-frontend
            -Dsonar.organization=<your_org_key>
            -Dsonar.sources=src
            -Dsonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/*.generated.ts,**/*gen*.ts
``
